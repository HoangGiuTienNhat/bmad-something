version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: sales_inventory_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sales_inventory
      POSTGRES_USER: sales_user
      POSTGRES_PASSWORD: sales_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales_user -d sales_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
